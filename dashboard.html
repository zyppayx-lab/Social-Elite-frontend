<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard | SocialElite</title>

<link rel="stylesheet"
href="dashboard.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>


<body>


<div class="dashboard">


<!-- HEADER -->

<header class="header">


<div class="logo-area">

<img
src="assets/logo.png"
alt="SocialElite"
class="logo">


<div>

<h2>SocialElite</h2>

<p>Premium Marketplace</p>

</div>

</div>


<button
class="notification-btn"
onclick="window.location.href='notification.html'">

<i class="fa-solid fa-bell"></i>

<span class="notification-dot"></span>

</button>


</header>




<!-- WALLET -->


<section class="wallet-card">


<p class="wallet-title">

Available Balance

</p>


<h1 id="walletBalance">

₦0.00

</h1>



<div class="wallet-buttons">


<a
href="deposit.html"
class="deposit-btn">

<i class="fa-solid fa-wallet"></i>

Deposit

</a>


<a
href="history.html"
class="history-btn">

<i class="fa-solid fa-clock-rotate-left"></i>

History

</a>


</div>


</section>





<!-- QUICK ACCESS -->


<section class="quick-access">


<h3>

Quick Access

</h3>



<div class="quick-grid">



<a
href="referral.html"
class="quick-card referral">

<i class="fa-solid fa-users"></i>

<span>

Referral

</span>

</a>




<a
href="profile.html"
class="quick-card profile">

<i class="fa-solid fa-user"></i>

<span>

Account

</span>

</a>




<a
href="my-purchases.html"
class="quick-card purchases">

<i class="fa-solid fa-bag-shopping"></i>

<span>

My Purchases

</span>

</a>



</div>


</section>





<!-- FEATURED SOCIAL ACCOUNTS -->


<section class="section">


<div class="section-header">


<h3>

Featured Social Accounts

</h3>


<a
href="marketplace.html"
class="view-all">

View All

<i class="fa-solid fa-arrow-right"></i>

</a>


</div>



<div
class="products-grid"
id="featuredAccounts">


<!-- Loaded dynamically from dashboard.js -->


</div>



</section>





</div>





<!-- BOTTOM NAVIGATION -->


<nav class="bottom-nav">



<a
href="dashboard.html"
class="nav-item active">

<i class="fa-solid fa-house"></i>

<span>

Home

</span>

</a>




<a
href="social-accounts.html"
class="nav-item">

<i class="fa-solid fa-cart-shopping"></i>

<span>

Purchase Accounts

</span>

</a>




<a
href="referral.html"
class="nav-item">

<i class="fa-solid fa-users"></i>

<span>

Referral

</span>

</a>




<a
href="profile.html"
class="nav-item">

<i class="fa-solid fa-user"></i>

<span>

Profile

</span>

</a>



</nav>





<!-- LOADING -->


<div
id="loadingOverlay"
class="loading-overlay">


<div class="loader"></div>


<p>

Loading...

</p>


</div>





<script type="module" src="dashboard.js"></script>


</body>

  </html>
