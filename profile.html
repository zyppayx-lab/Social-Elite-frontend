<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>SocialElite - Profile</title>


    <link rel="stylesheet" href="profile.css">


    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


</head>


<body>



<div class="profile-container">





    <!-- Profile Header -->


    <header class="profile-header">


        <h1>My Profile</h1>


        <p>Manage your account information</p>


    </header>







    <!-- Profile Avatar -->


    <section class="profile-card avatar-section">


        <img 
        id="profileAvatar"
        src=""
        alt="Profile Avatar"
        >



        <input 
        type="file"
        id="avatarInput"
        accept="image/*"
        hidden
        >




        <button id="changeAvatarBtn">

            <i class="fa-solid fa-camera"></i>

            Change Avatar

        </button>



    </section>







    <!-- Profile Information -->


    <section class="profile-card">



        <h2>

            Account Information

        </h2>





        <div class="info-group">


            <label>

                Full Name

            </label>



            <input 
            id="fullName"
            type="text"
            placeholder="Your name"
            disabled
            >


        </div>







        <div class="info-group">


            <label>

                Email

            </label>



            <input 
            id="email"
            type="email"
            disabled
            >


        </div>







        <div class="info-group">


            <label>

                Joined

            </label>



            <input 
            id="createdAt"
            disabled
            >


        </div>







        <button id="editProfileBtn">

            <i class="fa-solid fa-pen"></i>

            Edit Profile

        </button>






        <button id="saveProfileBtn" class="hidden">


            <i class="fa-solid fa-check"></i>

            Save Changes


        </button>





    </section>









    <!-- Referral Information -->


    <section class="profile-card">



        <h2>

            Referral

        </h2>





        <p>

            Referral Code:

        </p>





        <strong id="referralCode">

            Loading...

        </strong>





    </section>








    <!-- Account Actions -->


    <section class="profile-card account-actions">





        <button 
        id="deleteAccountBtn"
        class="delete-btn">



            <i class="fa-solid fa-trash"></i>


            Delete Account



        </button>








        <button 
        id="logoutBtn"
        class="logout-btn">



            <i class="fa-solid fa-right-from-bracket"></i>


            Logout



        </button>





    </section>







</div>






<script src="profile.js"></script>



</body>


            </html>
