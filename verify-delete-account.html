<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Delete Account | SocialElite</title>

<link rel="stylesheet" href="verify-delete-account.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
/>

</head>

<body>

<div class="page">

<div class="verify-card">

<div class="logo-area">

<img
src="assets/logo.png"
class="logo"
alt="SocialElite Logo">

<h1>Confirm Account Deletion</h1>

<p>

Enter the verification code sent to your email and your current password to permanently delete your account.

</p>

</div>

<div class="warning-box">

<i class="fa-solid fa-triangle-exclamation"></i>

<span>

This action is irreversible. Once deleted, your account cannot be recovered.

</span>

</div>

<form id="verifyDeleteForm">

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
readonly>

</div>

<div class="input-group">

<label>Verification Code</label>

<input
type="text"
id="otp"
maxlength="6"
placeholder="Enter 6-digit code"
required>

</div>

<div class="input-group">

<label>Current Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Enter current password"
required>

<button
type="button"
class="toggle-password"
data-target="password">

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>

<button
type="submit"
id="deleteBtn"
class="delete-btn">

Delete My Account

</button>

</form>

<div class="divider">

<span>Changed your mind?</span>

</div>

<a
href="login.html"
class="cancel-link">

Back to Login

</a>

</div>

</div>

<!-- Loading -->

<div
id="loadingOverlay"
class="loading-overlay">

<div class="loader"></div>

<p id="loadingText">

Deleting account...

</p>

</div>

<!-- Toast -->

<div
id="toast"
class="toast">

</div>

<script src="verify-delete-account.js"></script>

</body>
  </html>
