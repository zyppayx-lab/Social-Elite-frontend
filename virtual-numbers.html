<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Virtual Numbers | SocialElite</title>

<link rel="stylesheet"
href="virtual-numbers.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

    <header class="page-header">

        <h1>Virtual Numbers</h1>

        <p>
            Buy SMS verification numbers instantly.
        </p>

    </header>



    <div class="search-box">

        <input
            type="search"
            id="searchInput"
            placeholder="Search service (Telegram, WhatsApp, Google...)">

    </div>



    <div id="statusContainer"></div>



    <div
        id="servicesContainer"
        class="services-grid">

    </div>



    <div
        id="emptyState"
        class="empty-state"
        style="display:none;">

        <h2>No Services Found</h2>

        <p>

            Try another search.

        </p>

    </div>



    <div
        id="loadingState"
        class="loading-state">

        <div class="loader"></div>

        <p>Loading services...</p>

    </div>



    <button
        id="refreshBtn"
        class="refresh-btn">

        Refresh

    </button>

</div>

<script src="virtual-numbers.js"></script>

</body>

      </html>
