<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Account | SocialElite</title>

<link rel="stylesheet" href="verify-signup.css">

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
rel="stylesheet">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="logo">

<h1>SocialElite</h1>

<p>Verify your email to complete registration</p>

</div>

<form id="verifyForm">

<div class="form-group">

<label>Email Address</label>

<input
type="email"
id="email"
readonly>

</div>

<div class="form-group">

<label>Verification Code</label>

<input
type="text"
id="otp"
maxlength="6"
placeholder="Enter 6-digit OTP"
required>

</div>

<div class="form-group">

<label>Create Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Create Password"
required>

<button
type="button"
class="toggle-password"
data-target="password">

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>

<div class="form-group">

<label>Confirm Password</label>

<div class="password-box">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button
type="button"
class="toggle-password"
data-target="confirmPassword">

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>

<div id="passwordStrength"
class="password-strength">

</div>

<button
type="submit"
class="btn-primary">

Verify & Create Account

</button>

</form>

<div class="actions">

<button
id="resendOTP"
class="link-btn">

Resend OTP

</button>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</div>

</div>

<div
id="loadingOverlay"
class="loading-overlay">

<div class="loader"></div>

<p id="loadingText">

Please wait...

</p>

</div>

<div
id="toast"
class="toast">

</div>

<script src="verify-signup.js"></script>

</body>
</html>
