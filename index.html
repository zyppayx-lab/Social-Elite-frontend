<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SocialElite</title>

    <link rel="stylesheet" href="signup.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/6d2ea823d0.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="page">

    <div class="signup-card">

        <div class="logo-area">

            <img src="assets/logo.png" alt="SocialElite Logo" class="logo">

            <h1>Create Account</h1>

            <p>
                Join SocialElite and start buying premium social accounts,
                virtual numbers and digital services.
            </p>

        </div>

        <form id="signupForm">

            <div class="input-group">

                <label>Full Name</label>

                <input
                    type="text"
                    id="fullname"
                    placeholder="John Doe"
                    required
                >

            </div>

            <div class="input-group">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="example@email.com"
                    required
                >

            </div>

            <div class="input-group">

                <label>Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        placeholder="Create password"
                        required
                    >

                    <button
                        type="button"
                        class="toggle-password"
                        data-target="password">

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

                <div id="passwordStrength" class="password-strength"></div>

            </div>

            <div class="input-group">

                <label>Confirm Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm password"
                        required
                    >

                    <button
                        type="button"
                        class="toggle-password"
                        data-target="confirmPassword">

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

            </div>

            <div class="input-group">

                <label>
                    Referral Code
                    <span>(Optional)</span>
                </label>

                <input
                    type="text"
                    id="referralCode"
                    placeholder="Referral Code"
                >

            </div>

            <button
                type="submit"
                id="signupBtn"
                class="signup-btn">

                Continue

            </button>

        </form>

        <div class="divider">

            <span>Already have an account?</span>

        </div>

        <a href="login.html" class="login-link">

            Login Instead

        </a>

    </div>

</div>

<!-- Loading Overlay -->

<div id="loadingOverlay" class="loading-overlay">

    <div class="loader"></div>

    <p>Please wait...</p>

</div>

<!-- Toast Notification -->

<div id="toast" class="toast"></div>

<script src="signup.js"></script>

</body>
  </html>
